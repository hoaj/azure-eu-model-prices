              - generic [ref=e85]:
                - paragraph [ref=e86]: "𝜏²-Bench: Evaluating Conversational Agents in a Dual-Control Environment"
                - generic [ref=e87]: Victor Barres, Honghua Dong, Soham Ray, Xujie Si, Karthik Narasimhan.
                - generic [ref=e89]:
                  - heading "Abstract" [level=3] [ref=e90]:
                    - button "Abstract" [ref=e91] [cursor=pointer]:
                      - text: Abstract
                      - img [ref=e92]
                  - paragraph [ref=e95]: "Existing benchmarks for conversational AI agents simulate single-control environments, where only the AI agent can use tools to interact with the world, while the user remains a passive information provider. This differs from real-world scenarios like technical support, where users need to actively participate in modifying the state of the (shared) world. In order to address this gap, we introduce 𝜏²-bench, with four key contributions: 1) A novel Telecom dual-control domain modeled as a Dec-POMDP, where both agent and user make use of tools to act in a shared, dynamic environment that tests both agent coordination and communication, 2) A compositional task generator that programmatically creates diverse, verifiable tasks from atomic components, ensuring domain coverage and controlled complexity, 3) A reliable user simulator tightly coupled with the environment, whose behavior is constrained by tools and observable states, improving simulation fidelity, 4) Fine-grained analysis of agent performance through multiple ablations including separating errors arising from reasoning vs communication/coordination. In particular, our experiments show significant performance drops when agents shift from no-user to dual-control, highlighting the challenges of guiding users. Overall, 𝜏²-bench provides a controlled testbed for agents that must both reason effectively and guide user actions."
                  - region "Abstract":
                    - generic [ref=e96]: "Existing benchmarks for conversational AI agents simulate single-control environments, where only the AI agent can use tools to interact with the world, while the user remains a passive information provider. This differs from real-world scenarios like technical support, where users need to actively participate in modifying the state of the (shared) world. In order to address this gap, we introduce 𝜏²-bench, with four key contributions: 1) A novel Telecom dual-control domain modeled as a Dec-POMDP, where both agent and user make use of tools to act in a shared, dynamic environment that tests both agent coordination and communication, 2) A compositional task generator that programmatically creates diverse, verifiable tasks from atomic components, ensuring domain coverage and controlled complexity, 3) A reliable user simulator tightly coupled with the environment, whose behavior is constrained by tools and observable states, improving simulation fidelity, 4) Fine-grained analysis of agent performance through multiple ablations including separating errors arising from reasoning vs communication/coordination. In particular, our experiments show significant performance drops when agents shift from no-user to dual-control, highlighting the challenges of guiding users. Overall, 𝜏²-bench provides a controlled testbed for agents that must both reason effectively and guide user actions."
