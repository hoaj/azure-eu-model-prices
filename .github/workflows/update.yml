name: Update prices

# Refreshes index.html from the live Azure Retail Prices API.
#  • Daily on a schedule (so the site stays current with no action from you)
#  • On demand via the "Run workflow" button (Actions tab) — this is your one-press refresh
on:
  schedule:
    - cron: '17 5 * * *'      # every day at 05:17 UTC
  workflow_dispatch:           # manual "Run workflow" button
    inputs:
      fail_test:
        description: 'Force a failing run to test failure email notifications'
        type: boolean
        default: false

permissions:
  contents: write              # allow committing the regenerated file
  issues: write                # allow opening a failure-notification issue

concurrency:                   # never run two refreshes at once
  group: update-prices
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Notification test (manual only)
        if: ${{ inputs.fail_test }}
        run: |
          echo "::error::Deliberate test failure — verifying that failure emails reach hoaj@outlook.dk."
          exit 1

      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Regenerate index.html
        run: python3 generate.py

      - name: Commit if changed
        run: |
          git config user.name  "price-bot"
          git config user.email "price-bot@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: refresh Azure prices ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi

      - name: Notify on failure (assign an issue -> email)
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          title="⚠️ Automated data update failed"
          existing=$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "Failed again — run: $RUN_URL"
          else
            printf 'The scheduled update (Azure prices / Cognigy / τ²-bench) failed.\n\nRun: %s\n\ncc @hoaj' "$RUN_URL" \
              | gh issue create --title "$title" --assignee hoaj --body-file -
          fi
